name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mhc_cloud_panel
          POSTGRES_USER: mhc
          POSTGRES_PASSWORD: mhc
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mhc -d mhc_cloud_panel"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mhc_cloud_panel
      POSTGRES_USER: mhc
      POSTGRES_PASSWORD: mhc
      REDIS_URL: redis://localhost:6379/0
      SEED_ON_STARTUP: "false"
      JWT_SECRET: ci-secret
      JWT_ISSUER: mhc-cloud-panel
      CORS_ORIGINS: http://localhost:3000
      PROXMOX_HOST: http://localhost:8001
      PROXMOX_USER: mock
      PROXMOX_REALM: pam
      PROXMOX_TOKEN_NAME: mock
      PROXMOX_TOKEN_SECRET: mock
      PROXMOX_VERIFY_SSL: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        working-directory: backend
        run: python -m pip install -r requirements.txt
      - name: Tests
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

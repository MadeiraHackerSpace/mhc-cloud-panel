services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mhc_cloud_panel}
      POSTGRES_USER: ${POSTGRES_USER:-mhc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mhc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mhc} -d ${POSTGRES_DB:-mhc_cloud_panel}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      - PROXMOX_HOST
      - PROXMOX_USER
      - PROXMOX_REALM
      - PROXMOX_TOKEN_NAME
      - PROXMOX_TOKEN_SECRET
      - PROXMOX_VERIFY_SSL
      - PROXMOX_TIMEOUT_SECONDS
      - PROXMOX_RETRY_TOTAL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      - PROXMOX_HOST
      - PROXMOX_USER
      - PROXMOX_REALM
      - PROXMOX_TOKEN_NAME
      - PROXMOX_TOKEN_SECRET
      - PROXMOX_VERIFY_SSL
      - PROXMOX_TIMEOUT_SECONDS
      - PROXMOX_RETRY_TOTAL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "INFO", "-Q", "default"]

  celery-beat:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      - PROXMOX_HOST
      - PROXMOX_USER
      - PROXMOX_REALM
      - PROXMOX_TOKEN_NAME
      - PROXMOX_TOKEN_SECRET
      - PROXMOX_VERIFY_SSL
      - PROXMOX_TIMEOUT_SECONDS
      - PROXMOX_RETRY_TOTAL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "INFO", "--scheduler", "celery.beat:PersistentScheduler"]


  proxmox_mock:
    build:
      context: ./backend
    command: ["uvicorn", "proxmox_mock:app", "--host", "0.0.0.0", "--port", "8001"]

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      - PROXMOX_HOST
      - NEXT_PUBLIC_PROXMOX_HOST
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:

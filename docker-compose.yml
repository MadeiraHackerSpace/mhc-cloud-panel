services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mhc_cloud_panel}
      POSTGRES_USER: ${POSTGRES_USER:-mhc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mhc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mhc} -d ${POSTGRES_DB:-mhc_cloud_panel}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "INFO", "-Q", "default"]

  proxmox_mock:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    command: ["uvicorn", "proxmox_mock:app", "--host", "0.0.0.0", "--port", "8001"]

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
